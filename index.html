    <script>
      // Force SW unregister for PWA fix (v6)
      if (typeof navigator !== 'undefined' && navigator.serviceWorker && !localStorage.getItem('pwa_sw_reset_v4')) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          for (let reg of regs) reg.unregister();
          localStorage.setItem('pwa_sw_reset_v4', 'true');
          console.log('--- SW RESET TRIGGERED ---');
          location.reload();
        });
      }
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
